---
- name: Install required packages
  ansible.builtin.apt:
    name:
      - git
      - build-essential
      - python3
    state: present
    update_cache: yes

- name: Create /opt/dllama directory
  ansible.builtin.file:
    path: "{{ dllama_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Clone Distributed LLaMA source
  ansible.builtin.git:
    repo: https://github.com/b4rtaz/distributed-llama.git
    dest: "{{ dllama_src }}"
    version: main
    force: no
  register: dllama_git_result

- name: Build dllama
  ansible.builtin.make:
    chdir: "{{ dllama_src }}"
    target: dllama
  when: dllama_git_result.changed

- name: Build dllama-api
  ansible.builtin.make:
    chdir: "{{ dllama_src }}"
    target: dllama-api
  when: dllama_git_result.changed
