---
# List of users to configure dllama for on each node.
# Each user will get linger enabled and a systemd user service template installed.
dllama_users:
  - "{{ ansible_user | default('pi') }}"

# Whether to install build dependencies via apt.
dllama_install_build_deps: true

# Apt packages required to build/run dllama from source.
dllama_build_packages:
  - git
  - build-essential
  - make
  - cmake
  - pkg-config

# Enable loginctl linger so user services start at boot without a login session.
dllama_enable_linger: true

# Name of the systemd user service template unit.
dllama_service_name: "dllama-worker@.service"

# Relative path (under $HOME) for the systemd user unit directory.
dllama_user_systemd_dir: ".config/systemd/user"

# Directory name of the dllama repo clone inside the user's home.
dllama_repo_dir_name: "distributed-llama"
