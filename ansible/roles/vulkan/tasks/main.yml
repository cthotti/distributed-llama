- name: Refresh apt package metadata
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: "{{ vulkan_apt_cache_valid_time | default(3600) }}"
  when: vulkan_update_cache | default(true)

- name: Install Vulkan/Mesa packages (from backports)
  ansible.builtin.apt:
    name: "{{ vulkan_packages }}"
    state: present
    default_release: "{{ vulkan_apt_default_release | default(omit) }}"

- name: Set VK_ICD_FILENAMES for all shells
  ansible.builtin.copy:
    dest: /etc/profile.d/vulkan_icd.sh
    mode: "0644"
    content: |
      # Managed by Ansible
      export VK_ICD_FILENAMES="{{ vulkan_vk_icd_filenames }}"
  when: (vulkan_vk_icd_filenames | default("")) | length > 0

- name: Discover Vulkan ICD files
  ansible.builtin.find:
    paths: "{{ vulkan_icd_dir }}"
    file_type: file
    patterns: "*.json"
  register: vulkan_icd_files

- name: Verify at least one Vulkan ICD is present
  ansible.builtin.assert:
    that:
      - vulkan_icd_files.matched | int > 0
    fail_msg: >-
      No Vulkan ICD JSON files found in {{ vulkan_icd_dir }}.
      Check that mesa-vulkan-drivers installed correctly for this image.
