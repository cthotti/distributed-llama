---
# Refresh dnf metadata so package install uses current repository indexes
# Ansible dnf module handles cache update idempotently
- name: Refresh dnf package metadata
  ansible.builtin.dnf:
    update_cache: true
  when:
    - vulkan_update_cache

# Install Vulkan user-space runtime + Mesa Vulkan driver packages
- name: Install Vulkan runtime and driver packages
  ansible.builtin.dnf:
    name: "{{ vulkan_packages }}"
    state: present

# Look for Vulkan ICD JSON files in /usr/share/vulkan/icd.d
# Ansible find scans the directory and stores results in vulkan_icd_files
- name: Discover Vulkan ICD files
  ansible.builtin.find:
    paths: "{{ vulkan_icd_dir }}"
    file_type: file
    patterns: "*.json"
  register: vulkan_icd_files

# Require at least one ICD JSON so Vulkan loader can find a driver
# Ansible assert fails if vulkan_icd_files.matched is zero
- name: Verify at least one Vulkan ICD is present
  ansible.builtin.assert:
    that:
      - vulkan_icd_files.matched | int > 0
    fail_msg: >-
      No Vulkan ICD JSON files found in {{ vulkan_icd_dir }}.
      Check that mesa-vulkan-drivers installed correctly for this ARM image.

# Write /etc/profile.d/20-vulkan.sh so shells can export VK_* Vulkan env vars
# Ansible template renders from vulkan.sh.j2 and only changes the file when content changes
- name: Install Vulkan environment profile
  ansible.builtin.template:
    src: vulkan.sh.j2
    dest: /etc/profile.d/20-vulkan.sh
    owner: root
    group: root
    mode: "0644"
