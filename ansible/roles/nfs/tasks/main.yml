---
# ---- Server (rock0) ----
- name: Ensure backing dirs exist
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ nfs_spack_backing_dir }}"
    - "{{ nfs_modulefiles_backing_dir }}"
    - "{{ nfs_apps_backing_dir }}"

- name: Install NFS server packages
  become: true
  ansible.builtin.apt:
    update_cache: true
    name: "{{ nfs_server_packages }}"
    state: present
  when: inventory_hostname == nfs_host_name

- name: Configure NFS exports
  become: true
  ansible.builtin.blockinfile:
    path: /etc/exports
    marker: "# {mark} ANSIBLE SPACK EXPORTS"
    block: |
      {{ nfs_spack_backing_dir }} {{ nfs_export_subnet }}({{ nfs_export_options_ro }},fsid=10)
      {{ nfs_modulefiles_backing_dir }} {{ nfs_export_subnet }}({{ nfs_export_options_ro }},fsid=11)
      {{ nfs_apps_backing_dir }} {{ nfs_export_subnet }}({{ nfs_export_options_rw }},fsid=12)
  notify: Reload NFS exports
  when: inventory_hostname == nfs_host_name

- name: Ensure NFS server is running
  become: true
  ansible.builtin.service:
    name: nfs-server
    state: started
    enabled: true
  when: inventory_hostname == nfs_host_name

- name: Flush NFS handlers on server
  ansible.builtin.meta: flush_handlers
  when: inventory_hostname == nfs_host_name

# ---- Clients (rock1-rock15) ----
- name: Install NFS client packages
  become: true
  ansible.builtin.apt:
    update_cache: true
    name: "{{ nfs_client_packages }}"
    state: present
  when: inventory_hostname != nfs_host_name

- name: Ensure mount points exist
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ nfs_spack_prefix }}"
    - "{{ nfs_modulefiles_dir }}"
    - "{{ nfs_apps_dir }}"
  when:
    - inventory_hostname != nfs_host_name
    - ansible_mounts | selectattr("mount","equalto", item) | list | length == 0

- name: Mount NFS shares
  become: true
  ansible.posix.mount:
    path: "{{ item.path }}"
    src: "{{ nfs_host_name }}:{{ item.src }}"
    fstype: nfs4
    opts: "{{ item.opts }}"
    state: mounted
  loop:
    - path: "{{ nfs_spack_prefix }}"
      src: "{{ nfs_spack_backing_dir }}"
      opts: "{{ nfs_mount_opts_ro }}"
    - path: "{{ nfs_modulefiles_dir }}"
      src: "{{ nfs_modulefiles_backing_dir }}"
      opts: "{{ nfs_mount_opts_ro }}"
    - path: "{{ nfs_apps_dir }}"
      src: "{{ nfs_apps_backing_dir }}"
      opts: "{{ nfs_mount_opts_rw }}"
  when: inventory_hostname != nfs_host_name

- name: Update /apps permissions
  become: true
  ansible.builtin.file:
    path: "{{ nfs_apps_backing_dir }}"
    owner: root
    group: admin
    mode: "2775"
    recurse: true
  when: inventory_hostname == nfs_host_name

- name: Install ACL tools on NFS server
  become: true
  ansible.builtin.apt:
    update_cache: true
    name: acl
    state: present
  when: inventory_hostname == nfs_host_name

- name: Ensure admin group can always read/write /apps
  become: true
  ansible.posix.acl:
    path: "{{ nfs_apps_backing_dir }}"
    entity: admin
    etype: group
    permissions: rwX
    default: true
    recursive: true
    state: present
  when: inventory_hostname == nfs_host_name
