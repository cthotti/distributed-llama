- name: Set system hostname to inventory name
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Ensure 127.0.1.1 maps to this node's hostname (Debian convention)
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s+'
    line: "127.0.1.1 {{ inventory_hostname }}"
    create: true
    owner: root
    group: root
    mode: "0644"
    state: present

- name: Add cluster hostnames to /etc/hosts
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE CLUSTER HOSTS"
    owner: root
    group: root
    mode: "0644"
    block: |
      {% for h in base_cluster_hosts %}
      {{ h.ip }} {{ h.name }}
      {% endfor %}
